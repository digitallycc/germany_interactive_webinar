<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Germany Ausbildung OG Image</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');
  :root{
    --accent:#002FA7;
    --paper:#fafaf8;
    --ink:#0a0a0a;
    --grey-1:#f0f0ee;
    --grey-2:#d4d4d2;
    --grey-3:#737373;
  }
  body{
    width:800px;height:1200px;overflow:hidden;
    background:var(--paper);color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    position:relative;
  }

  .dot-grid{
    position:absolute;inset:0;z-index:0;
    background-image:radial-gradient(circle,var(--grey-2) .7px,transparent .7px);
    background-size:20px 20px;
    opacity:.3;
  }

  .accent-block{
    position:absolute;top:0;left:0;right:0;
    height:540px;background:var(--accent);z-index:1;
  }

  .canvas{
    position:relative;z-index:2;
    width:800px;height:1200px;
    padding:0 60px;
    display:flex;flex-direction:column;
  }

  /* Top accent section */
  .top{
    height:540px;display:flex;flex-direction:column;
    justify-content:center;color:#fff;
  }

  .kicker{
    font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;
    letter-spacing:.3em;text-transform:uppercase;
    color:rgba(255,255,255,.6);margin-bottom:28px;
    display:flex;align-items:center;gap:14px;
  }
  .kicker::before{content:"";width:32px;height:2px;background:rgba(255,255,255,.5)}

  .title{
    font-weight:200;font-size:82px;line-height:.98;
    letter-spacing:-.04em;color:#fff;
  }
  .title em{
    font-style:italic;font-weight:300;
    color:rgba(255,255,255,.8);
  }

  /* Bottom white section */
  .bottom{
    flex:1;display:flex;flex-direction:column;
    justify-content:center;padding-top:48px;
  }

  .stats-row{
    display:flex;gap:24px;margin-bottom:40px;
  }

  .stat{
    flex:1;padding-top:16px;
    border-top:3px solid var(--accent);
  }
  .stat .value{
    font-weight:800;font-size:38px;line-height:1;
    letter-spacing:-.03em;font-feature-settings:"tnum";
    color:var(--ink);margin-bottom:6px;
  }
  .stat .label{
    font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;
    letter-spacing:.2em;text-transform:uppercase;
    color:var(--grey-3);
  }

  .divider{width:100%;height:1px;background:var(--grey-2);margin-bottom:40px}

  .subtitle{
    font-size:18px;font-weight:400;line-height:1.6;
    color:var(--grey-3);letter-spacing:-.005em;
    max-width:900px;
  }
  .subtitle strong{color:var(--ink);font-weight:600}

  /* Bottom bar */
  .bottom-accent{
    position:absolute;bottom:0;left:0;right:0;height:6px;
    background:var(--accent);z-index:3;
  }
</style>
</head>
<body>

<div class="dot-grid"></div>
<div class="accent-block"></div>

<div class="canvas">
  <div class="top">
    <div class="kicker">Germany Ausbildung Program</div>
    <h1 class="title">
      Chhoti Si<br>
      Salary Par<br>
      <em>Guzara Kyun?</em>
    </h1>
  </div>

  <div class="bottom">
    <div class="stats-row">
      <div class="stat">
        <div class="value">Rs. 4 Lakh</div>
        <div class="label">Monthly Stipend</div>
      </div>
      <div class="stat">
        <div class="value">Zero</div>
        <div class="label">Blocked Account</div>
      </div>
      <div class="stat">
        <div class="value">8 Months</div>
        <div class="label">A1 to B2 German</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="subtitle">
      Free education + training. Official German contract. European qualification.<br>
      Pakistan se Germany — <strong>sirf ek decision ka farq hai.</strong>
    </div>
  </div>
</div>

<div class="bottom-accent"></div>

</body>
</html>
